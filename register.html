<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – ResumeML</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="static/auth.css">
</head>

<body class="auth-body">

    <div class="auth-wrapper">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="nav-badge">ML</div>
            <span>ResumeML</span>
        </div>

        <!-- Register Card -->
        <div class="auth-card">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Sign up to start analyzing your resume</p>

            <!-- Error / success messages -->
            <div class="auth-error"   id="auth-error"></div>
            <div class="auth-success" id="auth-success"></div>

            <!-- Register Form -->
            <div class="auth-form">

                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input
                        type="text"
                        id="username"
                        class="form-input"
                        placeholder="Choose a username"
                        onkeydown="if(event.key==='Enter') registerUser()"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="you@email.com"
                        onkeydown="if(event.key==='Enter') registerUser()"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="Minimum 6 characters"
                        onkeydown="if(event.key==='Enter') registerUser()"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input
                        type="password"
                        id="confirm-password"
                        class="form-input"
                        placeholder="Repeat your password"
                        onkeydown="if(event.key==='Enter') registerUser()"
                    >
                </div>

                <button class="auth-btn" id="register-btn" onclick="registerUser()">
                    <span id="register-btn-text">Create Account</span>
                </button>

            </div>

            <!-- Link to login -->
            <p class="auth-switch">
                Already have an account?
                <a href="/login" class="auth-link">Login here</a>
            </p>

        </div>

    </div>

    <script src="static/auth.js"></script>

</body>
</html>
